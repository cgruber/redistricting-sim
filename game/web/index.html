<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redistricting Simulator</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      #app-header {
        padding: 10px 16px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
      }

      #app-header h1 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #e94560;
      }

      #controls {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .district-btn {
        padding: 4px 12px;
        border: 2px solid transparent;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.15s;
      }

      .district-btn.active {
        border-color: white;
      }

      #btn-undo, #btn-redo, #btn-county-toggle {
        padding: 4px 10px;
        background: #0f3460;
        color: #e0e0e0;
        border: 1px solid #1a4a7a;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
      }

      #btn-undo:hover, #btn-redo:hover, #btn-county-toggle:hover {
        background: #1a4a7a;
      }

      #btn-undo:disabled, #btn-redo:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #btn-county-toggle.active {
        background: #1a4a7a;
        border-color: #3a7abd;
      }

      #btn-reset {
        padding: 4px 10px;
        background: #3a1020;
        color: #e0e0e0;
        border: 1px solid #7a2030;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
      }

      #btn-reset:hover {
        background: #5a1828;
      }

      #reset-confirm {
        display: none;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        color: #e0a0a0;
      }

      #reset-confirm.visible {
        display: flex;
      }

      #btn-reset-confirm, #btn-reset-cancel {
        padding: 3px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.82rem;
        border: 1px solid transparent;
      }

      #btn-reset-confirm {
        background: #7a2030;
        color: #fff;
        border-color: #a03040;
      }

      #btn-reset-confirm:hover {
        background: #a03040;
      }

      #btn-reset-cancel {
        background: #0f3460;
        color: #e0e0e0;
        border-color: #1a4a7a;
      }

      #btn-reset-cancel:hover {
        background: #1a4a7a;
      }

      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
        gap: 0;
      }

      #map-container {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        position: relative;
        user-select: none;
        cursor: crosshair;
      }

      #map-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      #sidebar {
        width: 260px;
        flex-shrink: 0;
        background: #16213e;
        border-left: 1px solid #0f3460;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      #sidebar h2 {
        font-size: 0.95rem;
        color: #e94560;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .result-district {
        background: #0f3460;
        border-radius: 6px;
        padding: 10px;
        border-left: 4px solid #ccc;
      }

      .result-district .dist-name {
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 6px;
      }

      .result-district .vote-bar {
        height: 8px;
        border-radius: 4px;
        background: linear-gradient(to right, #3a7bd5 var(--d-pct), #e94560 var(--d-pct));
        margin-bottom: 4px;
      }

      .result-district .vote-details {
        font-size: 0.78rem;
        color: #a0a0b0;
      }

      .result-district .winner-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .legend {
        font-size: 0.8rem;
        color: #a0a0b0;
        line-height: 1.6;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .legend-swatch {
        width: 16px;
        height: 16px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      #precinct-info {
        background: #0a1f3a;
        border: 1px solid #1a3a5c;
        border-radius: 6px;
        padding: 10px;
        font-size: 0.85rem;
      }

      #precinct-info .precinct-name {
        font-weight: 600;
        color: #c0d0e8;
        margin-bottom: 4px;
      }

      #precinct-info .precinct-detail {
        color: #a0a0b0;
        line-height: 1.5;
      }

      #precinct-info .precinct-placeholder {
        color: #505070;
        font-style: italic;
        line-height: 1.5;
      }

      .validity-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 6px 4px 10px;
        border-radius: 4px;
        font-size: 0.78rem;
        border-left: 3px solid transparent;
        background: #0a1f3a;
        margin-bottom: 3px;
      }

      .validity-ok { color: #80c080; }
      .validity-warn { color: #e0c040; }
      .validity-error { color: #e94560; }

      .validity-section-label {
        font-size: 0.72rem;
        color: #606080;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 6px 0 3px;
      }

      .validity-badge {
        font-weight: 600;
      }

      #wasm-status-bar {
        padding: 2px 16px;
        background: #16213e;
        border-top: 1px solid #0a1f3a;
        font-size: 0.7rem;
        color: #404060;
        flex-shrink: 0;
      }

      /* ── Intro screen ──────────────────────────────────────────────────────── */

      #intro-screen {
        position: fixed;
        inset: 0;
        background: #0d1b2e;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }

      #intro-screen.hidden {
        display: none;
      }

      #intro-card {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 10px;
        padding: 36px 40px 28px;
        max-width: 560px;
        width: 90%;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      #intro-character {
        border-bottom: 1px solid #0f3460;
        padding-bottom: 16px;
      }

      #intro-character .char-name {
        font-size: 1rem;
        font-weight: 700;
        color: #e94560;
      }

      #intro-character .char-role {
        font-size: 0.82rem;
        color: #8090a8;
        margin-top: 2px;
      }

      #intro-character .char-motivation {
        font-size: 0.82rem;
        color: #a0a8b8;
        margin-top: 8px;
        line-height: 1.5;
        font-style: italic;
      }

      #intro-slide-heading {
        font-size: 1.1rem;
        font-weight: 600;
        color: #c8d8f0;
        min-height: 1.4em;
      }

      #intro-slide-body {
        font-size: 0.88rem;
        color: #a0a8b8;
        line-height: 1.65;
        white-space: pre-line;
        min-height: 6em;
      }

      #intro-objective {
        background: #0a1f3a;
        border-left: 3px solid #e94560;
        border-radius: 4px;
        padding: 10px 14px;
        font-size: 0.84rem;
        color: #c0d0e8;
        line-height: 1.5;
      }

      #intro-objective .obj-label {
        font-size: 0.72rem;
        color: #606080;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      #intro-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      #intro-progress {
        font-size: 0.78rem;
        color: #505070;
      }

      #intro-nav .nav-btns {
        display: flex;
        gap: 8px;
      }

      #btn-intro-prev, #btn-intro-next {
        padding: 6px 14px;
        background: #0f3460;
        color: #e0e0e0;
        border: 1px solid #1a4a7a;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
      }

      #btn-intro-prev:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      #btn-intro-prev:not(:disabled):hover, #btn-intro-next:hover {
        background: #1a4a7a;
      }

      #btn-intro-start {
        padding: 6px 18px;
        background: #e94560;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.88rem;
        font-weight: 600;
        display: none;
      }

      #btn-intro-start.visible {
        display: block;
      }

      #btn-intro-start:hover {
        background: #c73050;
      }

      #btn-intro-skip {
        position: absolute;
        top: 16px;
        right: 20px;
        background: none;
        border: none;
        color: #404060;
        font-size: 0.78rem;
        cursor: pointer;
      }

      #btn-intro-skip:hover {
        color: #808090;
      }
    </style>
  </head>
  <body>
    <!-- ── Intro screen (GAME-016) ──────────────────────────────────────── -->
    <div id="intro-screen">
      <button id="btn-intro-skip">Skip intro</button>
      <div id="intro-card">
        <div id="intro-character">
          <div class="char-name" id="char-name"></div>
          <div class="char-role" id="char-role"></div>
          <div class="char-motivation" id="char-motivation"></div>
        </div>
        <div id="intro-slide-heading"></div>
        <div id="intro-slide-body"></div>
        <div id="intro-objective">
          <div class="obj-label">Your objective</div>
          <div id="objective-text"></div>
        </div>
        <div id="intro-nav">
          <span id="intro-progress"></span>
          <div class="nav-btns">
            <button id="btn-intro-prev" disabled>← Previous</button>
            <button id="btn-intro-next">Next →</button>
            <button id="btn-intro-start">Start Drawing</button>
          </div>
        </div>
      </div>
    </div>

    <header id="app-header" style="display:none">
      <h1>Redistricting Simulator</h1>
      <div id="controls">
        <span style="font-size:0.8rem;color:#888;">Draw district:</span>
        <div id="district-buttons"></div>
        <button id="btn-undo" disabled>↩ Undo</button>
        <button id="btn-redo" disabled>↪ Redo</button>
        <button id="btn-view-toggle">Switch to Partisan Lean</button>
        <button id="btn-county-toggle">Show County Borders</button>
        <button id="btn-reset">Reset</button>
        <span id="reset-confirm">
          Reset to start?
          <button id="btn-reset-confirm">Yes</button>
          <button id="btn-reset-cancel">No</button>
        </span>
      </div>
    </header>

    <div id="main" style="display:none">
      <div id="map-container">
        <svg id="map-svg"></svg>
      </div>
      <aside id="sidebar">
        <h2>Precinct Info</h2>
        <div id="precinct-info">
          <div class="precinct-placeholder">Hover over a precinct to see details.<br>Click and drag to paint districts.</div>
        </div>
        <h2>Election Results</h2>
        <div id="results-container">
          <div style="color:#606080;font-size:0.85rem;">Draw districts to see results</div>
        </div>
        <h2>Map Validity</h2>
        <div id="validity-container"></div>
        <h2>Legend</h2>
        <div id="legend-container" class="legend"></div>
      </aside>
    </div>

    <div id="wasm-status-bar" style="display:none">
      <span id="wasm-status"></span>
    </div>

    <!--
      WASM loading sequence (no-modules target):
      1. Load the wasm-bindgen glue — registers global wasm_bindgen.
      2. Init the WASM binary asynchronously.
      3. After WASM is ready, load the bundled game (ES module).
    -->
    <!--
      Import map: zundo pulls in zustand/esm/react.mjs which has a bare `import "react"`.
      Nothing in this app calls React APIs — shim it to an empty module so the browser
      doesn't fail resolving the bare specifier.
    -->
    <script type="importmap">
    {
      "imports": {
        "react": "data:text/javascript,export default {};",
        "react-dom": "data:text/javascript,export default {};"
      }
    }
    </script>
    <script src="wasm_calc_bindgen.js"></script>
    <script>
      wasm_bindgen("./wasm_calc_bindgen_bg.wasm").then(function () {
        var s = document.createElement("script");
        s.type = "module";
        s.src = "bundle.js";
        document.body.appendChild(s);
      });
    </script>
  </body>
</html>

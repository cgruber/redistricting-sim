# Buildkite CI Pipeline — redistricting-sim
#
# Runs on the macOS agent (native, no Docker). The game/ directory is the
# Bazel workspace; all build and test commands run from there.
#
# Dependency graph:
#   build ──── test
#
# Deployment is manual via prepare-release.sh and deploy.sh scripts.
# Setup (node_modules + Playwright Chromium) runs as part of the build step
# via game/setup.sh. It is idempotent — on a warm agent it exits quickly.

env:
  BUILDKITE_CLEAN_CHECKOUT: "true"

steps:

  ##############################################################################
  # BUILD — compile TypeScript, Rust/WASM, verify types; fail fast before tests
  ##############################################################################

  - label: ":hammer: Build"
    key: build
    agents:
      os: macos
    retry:
      automatic:
        - exit_status: "*"
          limit: 2
    command: |
      cd game
      ./setup.sh
      bazel clean
      bazel build --config=ci //...

  ##############################################################################
  # TEST — TypeScript type-check, unit tests, Playwright e2e smoke test
  ##############################################################################

  - label: ":bazel: Test"
    key: test
    depends_on: build
    agents:
      os: macos
    retry:
      automatic:
        - exit_status: "*"
          limit: 2
    command: |
      cd game
      ./setup.sh
      bazel test --config=ci //...

